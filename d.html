<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>KG支持·服务·下载</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            background: #ffffff;
            font-family: -apple-system, "Helvetica Neue", Roboto, sans-serif;
            overflow: hidden;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            background: #f5f7fa;
        }

        /* 顶部标题 */
        .app-header {
            flex-shrink: 0;
            padding: 16px 20px 8px;
            text-align: center;
            background: transparent;
            position: relative;
            z-index: 2;
        }
        .app-header h1 {
            font-size: 22px;
            font-weight: 600;
            color: #1c1c1e;
            letter-spacing: 1px;
        }
        .app-header .sub {
            font-size: 11px;
            color: #8e8e93;
            letter-spacing: 2px;
            margin-top: 2px;
        }

        /* 内容区域 */
        .content-area {
            flex: 1;
            padding: 12px 16px 8px;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        .content-card {
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(32px) saturate(180%);
            -webkit-backdrop-filter: blur(32px) saturate(180%);
            border-radius: 28px;
            border: 2px solid #1976d2;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04), 0 2px 8px rgba(0, 0, 0, 0.02), inset 0 0.5px 0 rgba(255, 255, 255, 0.8);
            overflow: hidden;
            transition: border-color 0.4s ease, box-shadow 0.4s ease;
            display: flex;
            flex-direction: column;
        }

        .panel-content {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
        }
        .panel-content.active {
            display: flex;
        }

        /* iframe 容器 */
        .panel-content .iframe-wrap {
            flex: 1;
            position: relative;
            background: #fafafa;
            overflow: hidden;
        }
        .panel-content .iframe-wrap iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            background: #ffffff;
        }

        /* 蓝奏云面板：显示提取码 */
        .panel-lanzou-header {
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
            font-size: 13px;
            color: #1c1c1e;
        }
        .panel-lanzou-header .extract-code {
            color: #f57c00;
            font-weight: 600;
            background: rgba(245, 124, 0, 0.08);
            padding: 2px 12px;
            border-radius: 12px;
            font-size: 12px;
        }

        /* 抖音面板 */
        .panel-content.douyin-content .douyin-link {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            gap: 10px;
            padding: 20px 32px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 0, 0, 0.03);
            transition: transform 0.2s ease, background 0.2s ease;
            width: 100%;
            max-width: 300px;
            margin: auto;
        }
        .panel-content.douyin-content .douyin-link:active {
            transform: scale(0.96);
            background: rgba(255, 255, 255, 0.5);
        }
        .panel-content.douyin-content .douyin-link img {
            width: 56px;
            height: 56px;
            object-fit: contain;
            border-radius: 6px;
        }
        .panel-content.douyin-content .douyin-link span {
            font-size: 14px;
            font-weight: 500;
            color: #1c1c1e;
            letter-spacing: 0.5px;
        }
        .panel-content.douyin-content .douyin-link .sub-hint {
            font-size: 11px;
            font-weight: 400;
            color: #8e8e93;
            letter-spacing: 0.3px;
        }

        /* 底部导航 */
        .bottom-nav {
            flex-shrink: 0;
            padding: 8px 12px 12px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border-top: 0.5px solid rgba(0, 0, 0, 0.04);
            display: flex;
            justify-content: space-around;
            align-items: center;
            gap: 4px;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            padding: 6px 0;
            flex: 1;
            cursor: pointer;
            border: none;
            background: transparent;
            font-family: inherit;
            font-size: 12px;
            font-weight: 500;
            color: #8e8e93;
            transition: color 0.25s ease, transform 0.15s ease;
            -webkit-tap-highlight-color: transparent;
            position: relative;
            user-select: none;
            border-radius: 12px;
            min-height: 44px;
        }
        .nav-item:active {
            transform: scale(0.92);
        }

        .nav-item.active {
            color: #1976d2;
        }

        .nav-item .nav-icon {
            display: none;
            width: 22px;
            height: 22px;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
            margin-bottom: 2px;
        }
        .nav-item.active .nav-icon {
            display: block;
        }

        .nav-item .nav-label {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }
        .nav-item.active .nav-label {
            font-weight: 600;
        }

        /* 小屏适配 */
        @media (max-width: 480px) {
            .app-header h1 {
                font-size: 18px;
            }
            .app-header .sub {
                font-size: 10px;
            }
            .content-area {
                padding: 8px 10px 6px;
            }
            .bottom-nav {
                padding: 4px 8px 8px;
            }
            .nav-item {
                font-size: 10px;
                min-height: 36px;
                padding: 4px 0;
            }
            .nav-item .nav-icon {
                width: 18px;
                height: 18px;
            }
            .panel-lanzou-header {
                font-size: 11px;
                padding: 6px 12px;
            }
            .panel-lanzou-header .extract-code {
                font-size: 10px;
                padding: 1px 8px;
            }
            .panel-content.douyin-content .douyin-link {
                padding: 16px 20px;
                max-width: 200px;
            }
            .panel-content.douyin-content .douyin-link img {
                width: 44px;
                height: 44px;
            }
            .panel-content.douyin-content .douyin-link span {
                font-size: 13px;
            }
        }

        @media (max-width: 380px) {
            .nav-item .nav-label {
                font-size: 9px;
            }
            .nav-item .nav-icon {
                width: 16px;
                height: 16px;
            }
        }

        @media (orientation: landscape) and (min-height: 500px) {
            .content-area {
                padding: 16px 24px 12px;
            }
            .bottom-nav {
                padding: 12px 20px 16px;
            }
            .nav-item .nav-icon {
                width: 24px;
                height: 24px;
            }
            .nav-item .nav-label {
                font-size: 13px;
            }
        }

        ::-webkit-scrollbar {
            width: 0;
            height: 0;
        }
    </style>
</head>
<body>
    <div class="app">

        <div class="app-header">
            <h1>KG支持·服务·下载</h1>
            <div class="sub">选择服务</div>
        </div>

        <div class="content-area">
            <div class="content-card" id="contentCard">

                <!-- 面板：蓝奏云 -->
                <div class="panel-content" id="panelLanzou">
                    <div class="panel-lanzou-header">
                        <span>📦 蓝奏云</span>
                        <span class="extract-code">提取码：kgdream</span>
                    </div>
                    <div class="iframe-wrap">
                        <iframe src="https://wwbpg.lanzouu.com/b0188grk4b" loading="lazy" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
                    </div>
                </div>

                <!-- 面板：抖音 -->
                <div class="panel-content douyin-content" id="panelDouyin">
                    <a href="https://m.douyin.com/share/user/MS4wLjABAAAAKuLiTRBe5BKSuGOrXTm5aciE0xnqzf3h_dfdV1s_3tmDa9oXB9ZAvJSwfrCpZ-ta" target="_blank" rel="noopener noreferrer" class="douyin-link">
                        <img src="https://www.douyin.com/favicon.ico" alt="抖音" loading="lazy" />
                        <span>前往抖音</span>
                        <span class="sub-hint">点击跳转</span>
                    </a>
                </div>

                <!-- 面板：123云盘 -->
                <div class="panel-content" id="panel123pan">
                    <div class="iframe-wrap">
                        <iframe src="https://1823501963.mshare.123pan.cn/123pan/jE4Fjv-oxiih" loading="lazy" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
                    </div>
                </div>

                <!-- 面板：精简版 -->
                <div class="panel-content" id="panelLite">
                    <div class="iframe-wrap">
                        <iframe src="/lite.html" loading="lazy" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
                    </div>
                </div>

            </div>
        </div>

        <div class="bottom-nav" id="bottomNav"></div>
    </div>

    <script>
        (function() {
            'use strict';

            const items = [{
                id: 'panel123pan',
                label: '123云盘',
                color: '#1976d2',
                link: 'https://1823501963.mshare.123pan.cn/123pan/jE4Fjv-oxiih',
                default: true
            }, {
                id: 'panelLanzou',
                label: '蓝奏云',
                color: '#f57c00',
                link: 'https://wwbpg.lanzouu.com/b0188grk4b',
                default: false
            }, {
                id: 'panelDouyin',
                label: '抖音',
                color: '#e60000',
                link: 'https://m.douyin.com/share/user/MS4wLjABAAAAKuLiTRBe5BKSuGOrXTm5aciE0xnqzf3h_dfdV1s_3tmDa9oXB9ZAvJSwfrCpZ-ta',
                default: false
            }, {
                id: 'panelLite',
                label: '精简版',
                color: '#000000',
                link: '/lite.html',
                default: false
            }];

            const contentCard = document.getElementById('contentCard');
            const bottomNav = document.getElementById('bottomNav');
            const panelMap = {
                'panelLanzou': document.getElementById('panelLanzou'),
                'panelDouyin': document.getElementById('panelDouyin'),
                'panel123pan': document.getElementById('panel123pan'),
                'panelLite': document.getElementById('panelLite')
            };

            let activeId = 'panel123pan';

            function buildNav() {
                bottomNav.innerHTML = '';
                items.forEach(item => {
                    const btn = document.createElement('button');
                    btn.className = 'nav-item';
                    btn.dataset.id = item.id;
                    btn.dataset.link = item.link;
                    btn.dataset.color = item.color;

                    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                    svg.setAttribute('viewBox', '0 0 24 24');
                    svg.setAttribute('class', 'nav-icon');
                    svg.innerHTML = `
                        <circle cx="12" cy="12" r="10" />
                        <line x1="2" y1="2" x2="22" y2="22" />
                        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
                        <path d="M2 12h20" />
                    `;
                    btn.appendChild(svg);

                    const label = document.createElement('span');
                    label.className = 'nav-label';
                    label.textContent = item.label;
                    btn.appendChild(label);

                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const id = this.dataset.id;
                        const link = this.dataset.link;
                        // 如果当前已是该界面，则跳转
                        if (activeId === id) {
                            if (link) {
                                window.open(link, '_blank');
                            }
                            return;
                        }
                        switchToPanel(id);
                    });

                    bottomNav.appendChild(btn);
                });
            }

            function switchToPanel(id) {
                // 隐藏所有
                Object.values(panelMap).forEach(el => {
                    el.classList.remove('active');
                });
                const target = panelMap[id];
                if (target) {
                    target.classList.add('active');
                }

                const item = items.find(i => i.id === id);
                if (item) {
                    contentCard.style.borderColor = item.color;
                }

                // 更新底部高亮
                const navBtns = bottomNav.querySelectorAll('.nav-item');
                navBtns.forEach(btn => {
                    btn.classList.remove('active');
                    btn.style.color = '#8e8e93';
                    if (btn.dataset.id === id) {
                        btn.classList.add('active');
                        btn.style.color = item ? item.color : '#1976d2';
                    }
                });

                activeId = id;
            }

            function init() {
                buildNav();
                const defaultItem = items.find(i => i.default) || items[0];
                switchToPanel(defaultItem.id);
            }

            init();

            // 窗口变化时无需额外操作

        })();
    </script>
</body>
</html>
